<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音楽ビジュアライザー</title>
  <!-- FFmpeg.wasm 0.11.x (旧API、SharedArrayBuffer不要) -->
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a;
      --panel: rgba(18, 18, 18, 0.92);
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.16);
      --text: #f2f2f2;
      --text-dim: rgba(242,242,242,0.5);
      --text-dimmer: rgba(242,242,242,0.32);
      --accent: #f2f2f2;
      --accent-active: #ffffff;
      --danger: #ff4d4d;
      --radius: 4px;
      --radius-lg: 6px;
    }
    body {
      background: var(--bg);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      overflow: hidden;
      letter-spacing: 0.01em;
    }
    #controls {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 6px;
      align-items: center;
      background: var(--panel);
      padding: 8px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      flex-wrap: wrap;
      justify-content: center;
      max-width: 95%;
    }
    button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    button:hover {
      background: rgba(255,255,255,0.06);
      border-color: var(--border-strong);
    }
    button.active {
      background: var(--accent-active);
      color: #000;
      border-color: var(--accent-active);
    }
    button.recording {
      background: var(--danger);
      border-color: var(--danger);
      color: #fff;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    select {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: var(--radius);
      font-size: 12px;
      cursor: pointer;
    }
    select:hover { border-color: var(--border-strong); }
    .file-label {
      display: inline-block;
      cursor: pointer;
    }
    .file-label input[type="file"] {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }
    .file-button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 500;
      transition: background 0.15s ease, border-color 0.15s ease;
      display: inline-block;
    }
    .file-label:hover .file-button {
      background: rgba(255,255,255,0.06);
      border-color: var(--border-strong);
    }
    #info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
      max-width: 90%;
      padding: 8px 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    #credits {
      position: fixed;
      bottom: 10px;
      right: 15px;
      font-size: 10px;
      color: var(--text-dimmer);
      z-index: 100;
    }
    #backgroundMedia {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      z-index: 1;
    }
    #settingsToggle {
      position: fixed;
      right: 20px;
      top: 20px;
      z-index: 101;
      width: 38px; height: 38px;
      border-radius: var(--radius);
      padding: 0;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #settingsPanel {
      position: fixed;
      right: 20px;
      top: 68px;
      width: 280px;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
      background: var(--panel);
      border-radius: var(--radius-lg);
      padding: 18px;
      z-index: 100;
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      display: none;
    }
    #settingsPanel.open { display: block; }
    #settingsPanel h3 {
      margin-bottom: 14px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }
    .setting-group { margin-bottom: 14px; }
    .setting-group label {
      display: block;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .setting-group input[type="range"] {
      width: 100%;
      height: 2px;
      border-radius: 1px;
      background: var(--border-strong);
      outline: none;
      -webkit-appearance: none;
    }
    .setting-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
    }
    .setting-group input[type="color"] {
      width: 100%;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      background: transparent;
    }
    .color-presets {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .color-preset {
      width: 22px; height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s ease;
    }
    .color-preset:hover { border-color: rgba(255,255,255,0.4); }
    .color-preset.selected { border-color: #fff; }
    .setting-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .setting-row input[type="range"] { flex: 1; }
    .setting-value {
      min-width: 32px;
      text-align: right;
      font-size: 11px;
      color: var(--text-dim);
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checkbox-group input[type="checkbox"] {
      width: 14px; height: 14px;
      cursor: pointer;
      accent-color: var(--text);
    }
    .section-divider {
      border-top: 1px solid var(--border);
      margin: 14px 0;
      padding-top: 14px;
    }
    #recordingIndicator {
      position: fixed;
      top: 68px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--danger);
      color: #fff;
      padding: 6px 16px;
      border-radius: var(--radius);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      z-index: 102;
      display: none;
    }
    #recordingIndicator.show { display: block; }

    #recordingFrame {
      position: fixed;
      pointer-events: none;
      z-index: 103;
      border: 2px dashed rgba(235, 51, 73, 0.85);
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
      display: none;
      box-sizing: border-box;
    }
    #recordingFrame.show { display: block; }
    #recordingFrameLabel {
      position: absolute;
      bottom: -22px;
      left: 0;
      font-size: 11px;
      color: rgba(235,51,73,0.9);
      white-space: nowrap;
      font-family: -apple-system, sans-serif;
      letter-spacing: 0.03em;
    }

    #convertingOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(10,10,10,0.96);
      z-index: 200;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }
    #convertingOverlay.show { display: flex; }
    #convertingOverlay h2 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }
    #convertingOverlay p { font-size: 12px; color: var(--text-dim); text-align: center; max-width: 360px; line-height: 1.6; }
    #convertProgress {
      width: 280px;
      height: 2px;
      background: var(--border-strong);
      border-radius: 1px;
      overflow: hidden;
    }
    #convertProgressBar {
      height: 100%;
      width: 0%;
      background: var(--text);
      border-radius: 1px;
      transition: width 0.3s ease;
    }
    #convertProgressBar.indeterminate {
      width: 35% !important;
      animation: indeterminateSlide 1.2s ease-in-out infinite;
      transition: none;
    }
    @keyframes indeterminateSlide {
      0%   { margin-left: 0%; }
      50%  { margin-left: 65%; }
      100% { margin-left: 0%; }
    }
    #convertStatus {
      font-size: 11px;
      color: var(--text-dimmer);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <img id="backgroundImage" style="display: none;">
  <video id="backgroundMedia" muted loop playsinline style="display: none;"></video>

  <div id="controls">
    <button id="micBtn">🎤 マイク</button>
    <label class="file-label">
      <input type="file" id="fileInput" accept="audio/*">
      <span class="file-button">🎵 音楽</span>
    </label>
    <button id="playBtn" style="display: none;">⏸️</button>
    <select id="modeSelect">
      <option value="circles">🔵 サークル</option>
      <option value="bars">📊 バー</option>
      <option value="wave">🌊 ウェーブ</option>
      <option value="spiral">🌀 スパイラル</option>
      <option value="geometric">🔷 ジオメトリック</option>
      <option value="flower">🌸 フラワー</option>
      <option value="pulse">⚡ パルス</option>
      <option value="kaleidoscope">🔺 カレイドスコープ</option>
      <option value="mesh">🌐 メッシュ</option>
      <option value="crystal">💎 クリスタル</option>
      <option value="dots">🟣 ドットイコライザー</option>
      <option value="symmetricwave">🎵 シンメトリックウェーブ</option>
      <option value="circlebars">⭕ サークルバー</option>
      <option value="neonwave">💚 ネオンウェーブ</option>
      <option value="rainbowblocks">🌈 レインボーブロック</option>
      <option value="liquidwave">🌊 液体波形</option>
      <option value="spiralfirework">✨ スパイラル花火</option>
    </select>
    <button id="recordBtn">⏺️ 録画開始</button>
  </div>

  <button id="settingsToggle">⚙️</button>

  <div id="recordingIndicator">🔴 録画中...</div>
  <div id="recordingFrame"><span id="recordingFrameLabel"></span></div>

  <div id="convertingOverlay">
    <h2>🎬 MP4に変換中...</h2>
    <div id="convertProgress"><div id="convertProgressBar"></div></div>
    <div id="convertStatus">準備中...</div>
    <p>そのままお待ちください。変換が完了すると自動的にダウンロードが始まります。</p>
    <p id="safariWarning" style="display:none; color:#ffcc00;">⚠️ Safariはこの処理との相性が悪く、非常に時間がかかったり完了しない場合があります。Chromeのご利用を推奨します。</p>
  </div>

  <div id="settingsPanel">
    <h3>🎨 ビジュアル調整</h3>

    <div class="setting-group">
      <div class="checkbox-group">
        <input type="checkbox" id="mirrorReflection">
        <label for="mirrorReflection">🪞 鏡面反射（レインボーブロック専用）</label>
      </div>
    </div>

    <div class="setting-group">
      <label>サイズ</label>
      <div class="setting-row">
        <input type="range" id="sizeScale" min="0.3" max="2" step="0.1" value="1">
        <span class="setting-value" id="sizeValue">1.0x</span>
      </div>
    </div>

    <div class="setting-group">
      <label>線の太さ</label>
      <div class="setting-row">
        <input type="range" id="lineWidth" min="1" max="10" step="0.5" value="2">
        <span class="setting-value" id="lineWidthValue">2</span>
      </div>
    </div>

    <div class="setting-group">
      <label>音への反応度</label>
      <div class="setting-row">
        <input type="range" id="sensitivity" min="0.2" max="3" step="0.1" value="1">
        <span class="setting-value" id="sensitivityValue">1.0x</span>
      </div>
    </div>

    <div class="setting-group">
      <label>回転スピード</label>
      <div class="setting-row">
        <input type="range" id="rotationSpeed" min="0" max="3" step="0.1" value="1">
        <span class="setting-value" id="rotationSpeedValue">1.0x</span>
      </div>
    </div>

    <div class="setting-group">
      <label>残像効果</label>
      <div class="setting-row">
        <input type="range" id="trailEffect" min="0.02" max="0.5" step="0.02" value="0.1">
        <span class="setting-value" id="trailEffectValue">0.1</span>
      </div>
    </div>

    <div class="setting-group">
      <label>メインカラー</label>
      <input type="color" id="mainColor" value="#667eea">
      <div class="color-presets">
        <!-- 元のプリセット -->
        <div class="color-preset selected" style="background: linear-gradient(135deg, #667eea, #764ba2);" data-colors="102,126,234|118,75,162|240,98,146|255,171,64|77,208,225" title="パープル・ピンク"></div>
        <div class="color-preset" style="background: linear-gradient(135deg, #ff6b6b, #feca57);" data-colors="255,107,107|254,202,87|255,159,67|238,82,83|10,189,227" title="サンセット"></div>
        <div class="color-preset" style="background: linear-gradient(135deg, #00d2d3, #54a0ff);" data-colors="0,210,211|84,160,255|95,39,205|200,214,229|87,101,116" title="オーシャン"></div>
        <div class="color-preset" style="background: linear-gradient(135deg, #ff9ff3, #f368e0);" data-colors="255,159,243|243,104,224|255,107,107|253,150,68|0,206,201" title="ピンク"></div>
        <div class="color-preset" style="background: linear-gradient(135deg, #2ed573, #1e90ff);" data-colors="46,213,115|30,144,255|255,71,87|255,165,2|123,237,159" title="ネオン"></div>
        <!-- 新しいプリセット -->
        <div class="color-preset" style="background: linear-gradient(135deg, #f093fb, #f5576c);" data-colors="240,147,251|245,87,108|254,140,131|255,184,140|236,204,104" title="ピーチ"></div>
        <div class="color-preset" style="background: linear-gradient(135deg, #4facfe, #00f2fe);" data-colors="79,172,254|0,242,254|67,233,123|255,236,39|255,154,158" title="スカイ"></div>
        <div class="color-preset" style="background: linear-gradient(135deg, #43e97b, #38f9d7);" data-colors="67,233,123|56,249,215|79,172,254|168,192,255|204,169,255" title="ミント"></div>
        <div class="color-preset" style="background: linear-gradient(135deg, #fa709a, #fee140);" data-colors="250,112,154|254,225,64|255,154,158|254,207,239|168,192,255" title="トロピカル"></div>
        <div class="color-preset" style="background: linear-gradient(135deg, #a18cd1, #fbc2eb);" data-colors="161,140,209|251,194,235|255,154,158|254,207,239|168,192,255" title="パステル"></div>
        <div class="color-preset" style="background: linear-gradient(135deg, #ff0844, #ffb199);" data-colors="255,8,68|255,177,153|255,220,178|193,248,207|200,232,252" title="コーラル"></div>
        <div class="color-preset" style="background: linear-gradient(135deg, #0ba360, #3cba92);" data-colors="11,163,96|60,186,146|130,218,140|255,240,165|255,191,145" title="フォレスト"></div>
        <div class="color-preset" style="background: linear-gradient(135deg, #6a11cb, #2575fc);" data-colors="106,17,203|37,117,252|102,126,234|168,192,255|255,154,158" title="ディープブルー"></div>
        <div class="color-preset" style="background: linear-gradient(135deg, #f77062, #fe5196);" data-colors="247,112,98|254,81,150|255,154,158|254,207,239|161,140,209" title="ローズ"></div>
        <div class="color-preset" style="background: linear-gradient(135deg, #c471f5, #fa71cd);" data-colors="196,113,245|250,113,205|255,154,158|254,225,64|168,192,255" title="バイオレット"></div>
        <!-- モノクロ系 -->
        <div class="color-preset" style="background: linear-gradient(135deg, #fff, #888);" data-colors="255,255,255|200,200,200|150,150,150|100,100,100|50,50,50" title="モノクロ"></div>
        <div class="color-preset" style="background: linear-gradient(135deg, #00ffff, #0080ff);" data-colors="0,255,255|0,200,255|0,150,255|0,100,255|0,50,200" title="サイバー"></div>
        <div class="color-preset" style="background: linear-gradient(135deg, #ff00ff, #8000ff);" data-colors="255,0,255|200,0,255|150,0,255|100,0,200|50,0,150" title="マゼンタ"></div>
        <div class="color-preset" style="background: linear-gradient(135deg, #ffff00, #ff8000);" data-colors="255,255,0|255,220,0|255,180,0|255,140,0|255,100,0" title="ゴールド"></div>
        <div class="color-preset" style="background: linear-gradient(135deg, #00ff00, #008000);" data-colors="0,255,0|0,220,50|0,180,100|0,140,50|0,100,0" title="マトリックス"></div>
      </div>
    </div>

    <div class="setting-group">
      <label>グラデーションモード</label>
      <select id="gradientMode" style="width: 100%;">
        <option value="palette">パレット（複数色）</option>
        <option value="rainbow">レインボー</option>
        <option value="smooth">スムースグラデーション</option>
        <option value="single">単色</option>
      </select>
    </div>

    <div class="setting-group">
      <label>背景色（背景メディアがない時）</label>
      <input type="color" id="bgColor" value="#000000">
    </div>

    <div class="setting-group">
      <div class="checkbox-group">
        <input type="checkbox" id="showParticles" checked>
        <label for="showParticles">パーティクル表示</label>
      </div>
    </div>

    <div class="setting-group">
      <div class="checkbox-group">
        <input type="checkbox" id="showCenterCircle" checked>
        <label for="showCenterCircle">中央の円を表示</label>
      </div>
    </div>

    <div class="setting-group">
      <label>波形の滑らかさ</label>
      <div class="setting-row">
        <input type="range" id="smoothness" min="1" max="10" step="1" value="5">
        <span class="setting-value" id="smoothnessValue">5</span>
      </div>
    </div>

    <div class="setting-group">
      <label>パーティクル数</label>
      <div class="setting-row">
        <input type="range" id="particleCount" min="0" max="200" step="10" value="100">
        <span class="setting-value" id="particleCountValue">100</span>
      </div>
    </div>

    <div class="section-divider">
      <h3>🖼️ 背景メディア</h3>
    </div>

    <div class="setting-group">
      <label class="file-label" style="width: 100%;">
        <input type="file" id="bgImageInput" accept="image/*">
        <span class="file-button" style="width: 100%; text-align: center; display: block;">🖼️ 背景画像を選択</span>
      </label>
    </div>

    <div class="setting-group">
      <label class="file-label" style="width: 100%;">
        <input type="file" id="bgVideoInput" accept="video/*">
        <span class="file-button" style="width: 100%; text-align: center; display: block;">🎬 背景動画を選択</span>
      </label>
    </div>

    <div class="setting-group">
      <label>背景の透明度</label>
      <div class="setting-row">
        <input type="range" id="bgOpacity" min="0" max="1" step="0.1" value="0.5">
        <span class="setting-value" id="bgOpacityValue">0.5</span>
      </div>
    </div>

    <div class="setting-group">
      <label>背景の表示方法</label>
      <select id="bgFitMode" style="width: 100%;">
        <option value="cover">カバー（画面を埋める、はみ出しは切り取り）</option>
        <option value="contain">フィット（全体を表示、余白あり）</option>
        <option value="stretch">引き伸ばし（アスペクト比を無視）</option>
      </select>
    </div>

    <div class="setting-group">
      <button id="clearBgBtn" style="width: 100%;">🗑️ 背景をクリア</button>
    </div>

    <div class="section-divider">
      <h3>🎥 録画設定</h3>
    </div>

    <div class="setting-group">
      <label>出力解像度</label>
      <select id="resolutionMode" style="width: 100%;">
        <option value="screen">画面サイズ（プレビューと同じ）</option>
        <option value="bg">背景メディアに合わせる</option>
        <option value="1920x1080">1920 × 1080（フルHD・横）</option>
        <option value="1080x1920">1080 × 1920（フルHD・縦）</option>
        <option value="1080x1080">1080 × 1080（正方形）</option>
        <option value="3840x2160">3840 × 2160（4K・横）</option>
        <option value="custom">カスタム指定</option>
      </select>
    </div>

    <div class="setting-group" id="customResolutionGroup" style="display: none;">
      <div class="setting-row">
        <input type="number" id="customWidth" placeholder="幅" value="1920" min="2" max="7680" step="2" style="width: 50%; background: transparent; border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: var(--radius); font-size: 12px;">
        <span style="color: var(--text-dim); font-size: 12px;">×</span>
        <input type="number" id="customHeight" placeholder="高さ" value="1080" min="2" max="7680" step="2" style="width: 50%; background: transparent; border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: var(--radius); font-size: 12px;">
      </div>
      <label style="margin-top: 6px; font-size: 10px; color: var(--text-dimmer);">※ 幅・高さは偶数のみ指定可能です</label>
    </div>

    <div class="setting-group" style="background: rgba(255,255,255,0.04); padding: 10px; border-radius: var(--radius); margin-top: 10px;">
      <label style="font-size: 10px; color: var(--text-dim);" id="resolutionPreview">出力サイズ: 画面サイズに従います</label>
    </div>

    <div class="setting-group">
      <label>出力形式</label>
      <select id="outputFormat" style="width: 100%;">
        <option value="mp4">MP4（自動変換・推奨）</option>
        <option value="webm">WebM（高速・変換なし）</option>
      </select>
    </div>

    <div class="setting-group">
      <label>録画品質</label>
      <select id="recordQuality" style="width: 100%;">
        <option value="high">高品質 (大きいファイル)</option>
        <option value="medium" selected>標準</option>
        <option value="low">低品質 (小さいファイル)</option>
      </select>
    </div>

    <div class="setting-group">
      <label>音声</label>
      <select id="recordAudio" style="width: 100%;">
        <option value="yes">音声あり</option>
        <option value="no">音声なし</option>
      </select>
    </div>

    <div class="setting-group">
      <div class="checkbox-group">
        <input type="checkbox" id="recordFromStart" checked>
        <label for="recordFromStart">冒頭から録画（音楽/動画を最初から再生）</label>
      </div>
    </div>

    <div class="setting-group" style="background: rgba(100,200,100,0.1); padding: 10px; border-radius: 8px; margin-top: 10px;">
      <label style="color: #88ff88; font-size: 10px;">✅ 録画停止後、自動的にMP4（H.264）に変換してダウンロードします。変換には数秒〜数十秒かかります。</label>
    </div>

    <div class="setting-group">
      <button id="resetSettings" style="width: 100%;">🔄 設定リセット</button>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <div id="info">
    🎵 マイクまたは音楽ファイルを選択して開始してください
  </div>

  <div id="credits">
    Music Visualizer v1.0 | Created by POCCO
  </div>

  <script>
    // グローバル変数
    let canvas, ctx;
    let audioContext, analyser, dataArray, bufferLength;
    let source = null;
    let micStream = null;
    let isMicActive = false;
    let isAudioPlaying = false;
    let currentFileName = '';
    let isRunning = false;
    let mode = 'circles';
    let angleOffset = 0;
    let particles = [];
    let audioElement = null;

    // 背景メディア
    let bgImage = null;
    let bgVideo = null;
    let hasBgMedia = false;

    // 録画
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;
    let ffmpegLoaded = false;
    let ffmpegInstance = null;
    let isRecordingResizeLocked = false; // 録画中は画面リサイズでcanvasサイズを変えない

    // 設定
    let settings = {
      sizeScale: 1,
      lineWidth: 2,
      sensitivity: 1,
      rotationSpeed: 1,
      trailEffect: 0.1,
      bgColor: [0, 0, 0],
      bgOpacity: 0.5,
      bgFitMode: 'cover',
      showParticles: true,
      showCenterCircle: true,
      smoothness: 5,
      particleCount: 100,
      recordQuality: 'medium',
      recordAudio: 'yes',
      recordFromStart: true,
      outputFormat: 'mp4',
      mirrorReflection: false,
      resolutionMode: 'screen',
      customWidth: 1920,
      customHeight: 1080,
      gradientMode: 'palette'
    };

    let palette = [
      [102, 126, 234],
      [118, 75, 162],
      [240, 98, 146],
      [255, 171, 64],
      [77, 208, 225],
    ];

    window.addEventListener('DOMContentLoaded', init);

    function init() {
      try {
        canvas = document.getElementById('canvas');
        if (!canvas) { console.error('canvas not found'); return; }
        ctx = canvas.getContext('2d');
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        updateParticles();

        // イベントリスナー（要素の存在確認付き）
        const micBtn = document.getElementById('micBtn');
        const fileInput = document.getElementById('fileInput');
        const playBtn = document.getElementById('playBtn');
        const modeSelect = document.getElementById('modeSelect');
        const settingsToggle = document.getElementById('settingsToggle');
        const recordBtn = document.getElementById('recordBtn');
        const bgImageInput = document.getElementById('bgImageInput');
        const bgVideoInput = document.getElementById('bgVideoInput');
        const clearBgBtn = document.getElementById('clearBgBtn');

        if (micBtn) micBtn.addEventListener('click', toggleMic);
        if (fileInput) fileInput.addEventListener('change', handleFile);
        if (playBtn) playBtn.addEventListener('click', toggleAudioPlayback);
        if (modeSelect) modeSelect.addEventListener('change', (e) => mode = e.target.value);
        if (settingsToggle) settingsToggle.addEventListener('click', toggleSettings);
        if (recordBtn) recordBtn.addEventListener('click', toggleRecording);
        if (bgImageInput) bgImageInput.addEventListener('change', handleBgImage);
        if (bgVideoInput) bgVideoInput.addEventListener('change', handleBgVideo);
        if (clearBgBtn) clearBgBtn.addEventListener('click', clearBackground);

        setupSettingsListeners();
        animate();
        console.log('初期化完了');
        updateResolutionPreview();

        // FFmpegをバックグラウンドでプリロード開始（初回録画時の待ち時間を短縮）
        setTimeout(() => loadFFmpeg(), 2000);
      } catch (err) {
        console.error('初期化エラー:', err);
        alert('初期化エラー: ' + err.message);
      }
    }

    function resizeCanvas() {
      if (isRecordingResizeLocked) {
        // 録画中は内部解像度は固定のまま、画面サイズ変化に応じて表示位置だけ再調整
        fitCanvasDisplayToScreen();
        return;
      }
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      // 通常時は内部解像度＝画面サイズなので、CSS表示サイズの指定は不要（解除しておく）
      canvas.style.width = '';
      canvas.style.height = '';
      canvas.style.left = '0';
      canvas.style.top = '0';
    }

    // 録画中、canvasの内部解像度（縦横比）を保ったまま画面内に収まるようCSS表示サイズを調整
    function fitCanvasDisplayToScreen() {
      const screenW = window.innerWidth;
      const screenH = window.innerHeight;
      const canvasRatio = canvas.width / canvas.height;
      const screenRatio = screenW / screenH;

      let displayW, displayH;
      if (canvasRatio > screenRatio) {
        displayW = screenW;
        displayH = screenW / canvasRatio;
      } else {
        displayH = screenH;
        displayW = screenH * canvasRatio;
      }

      canvas.style.width = displayW + 'px';
      canvas.style.height = displayH + 'px';
      canvas.style.left = ((screenW - displayW) / 2) + 'px';
      canvas.style.top = ((screenH - displayH) / 2) + 'px';

      // 録画枠も同じ位置・サイズに更新
      updateRecordingFrame(displayW, displayH,
        (screenW - displayW) / 2, (screenH - displayH) / 2);
    }

    function updateRecordingFrame(w, h, left, top) {
      const frame = document.getElementById('recordingFrame');
      const label = document.getElementById('recordingFrameLabel');
      if (!frame) return;
      frame.style.width = w + 'px';
      frame.style.height = h + 'px';
      frame.style.left = left + 'px';
      frame.style.top = top + 'px';
      if (label) label.textContent = `録画範囲: ${canvas.width} × ${canvas.height}`;
    }

    function showRecordingFrame() {
      const res = getOutputResolution();
      // 画面サイズモードの場合はcanvas全体＝画面全体なので枠は不要だが一応表示
      const screenW = window.innerWidth;
      const screenH = window.innerHeight;

      if (settings.resolutionMode === 'screen') {
        // 画面サイズ＝canvasサイズなので画面全体に薄い枠だけ表示
        updateRecordingFrame(screenW, screenH, 0, 0);
      } else {
        // fitCanvasDisplayToScreen内でupdateRecordingFrameが呼ばれる
        fitCanvasDisplayToScreen();
      }
      document.getElementById('recordingFrame').classList.add('show');
      const label = document.getElementById('recordingFrameLabel');
      if (label) label.textContent = `録画範囲: ${res.width} × ${res.height}`;
    }

    function hideRecordingFrame() {
      document.getElementById('recordingFrame').classList.remove('show');
    }

    function toggleSettings() {
      document.getElementById('settingsPanel').classList.toggle('open');
    }

    function showInfo(message) {
      document.getElementById('info').textContent = message;
    }

    // 背景画像
    async function handleBgImage(e) {
      const file = e.target.files[0];
      if (!file) return;

      clearBackground();

      try {
        // createImageBitmapを使用（file://でも動作）
        const bitmap = await createImageBitmap(file);
        bgImage = bitmap;
        hasBgMedia = true;
        showInfo('🖼️ 背景画像を設定しました: ' + file.name);
        updateResolutionPreview();
      } catch (err) {
        console.error('画像読み込みエラー:', err);
        showInfo('❌ 画像の読み込みに失敗しました: ' + file.name);
      }
    }

    // 背景動画
    function handleBgVideo(e) {
      const file = e.target.files[0];
      if (!file) return;

      clearBackground();

      const video = document.getElementById('backgroundMedia');
      video.src = URL.createObjectURL(file);
      video.style.display = 'block';
      video.play();
      video.addEventListener('loadedmetadata', updateResolutionPreview, { once: true });

      bgVideo = video;
      hasBgMedia = true;
      showInfo('🎬 背景動画を設定しました: ' + file.name);
    }

    // 背景クリア
    function clearBackground() {
      bgImage = null;
      bgVideo = null;
      hasBgMedia = false;
      updateResolutionPreview();

      const imgEl = document.getElementById('backgroundImage');
      if (imgEl) {
        if (imgEl.src) URL.revokeObjectURL(imgEl.src);
        imgEl.src = '';
      }

      const video = document.getElementById('backgroundMedia');
      if (video) {
        video.pause();
        if (video.src) URL.revokeObjectURL(video.src);
        video.src = '';
        video.style.display = 'none';
      }

      showInfo('🗑️ 背景をクリアしました');
    }

    // FFmpeg初期化（バックグラウンドでロード）
    async function loadFFmpeg() {
      if (ffmpegLoaded) return ffmpegInstance;
      try {
        const { createFFmpeg } = FFmpeg;
        ffmpegInstance = createFFmpeg({
          log: true,
          // @ffmpeg/core 0.11.0 (SharedArrayBuffer不要のシングルスレッド版)
          corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
          progress: ({ ratio }) => {
            // ratioがNaN/Infinity/負数など不正な場合は無視（不確定アニメーションのまま）
            if (typeof ratio !== 'number' || !isFinite(ratio) || ratio < 0) return;
            const pct = Math.min(100, Math.max(0, Math.round(ratio * 100)));
            const bar = document.getElementById('convertProgressBar');
            bar.classList.remove('indeterminate');
            bar.style.width = pct + '%';
            document.getElementById('convertStatus').textContent = `変換中... ${pct}%`;
          }
        });
        await ffmpegInstance.load();
        ffmpegLoaded = true;
        console.log('FFmpeg.wasm ロード完了');
        return ffmpegInstance;
      } catch (e) {
        console.error('FFmpeg.wasm ロード失敗:', e);
        ffmpegLoaded = false;
        ffmpegInstance = null;
        return null;
      }
    }

    // 録画トグル
    function toggleRecording() {
      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    }

    // Safari判定（FFmpeg.wasmとの相性問題があるため警告表示用）
    function isSafari() {
      const ua = navigator.userAgent;
      return /^((?!chrome|android|crios|fxios|edg).)*safari/i.test(ua);
    }

    // 偶数に丸める（H.264は奇数解像度を許容しないため）
    function toEven(n) {
      n = Math.round(n);
      return n % 2 === 0 ? n : n - 1;
    }

    // 設定に応じた出力解像度を計算
    function getOutputResolution() {
      switch (settings.resolutionMode) {
        case 'bg': {
          if (bgVideo && bgVideo.videoWidth) {
            return { width: toEven(bgVideo.videoWidth), height: toEven(bgVideo.videoHeight) };
          }
          if (bgImage && bgImage.width) {
            return { width: toEven(bgImage.width), height: toEven(bgImage.height) };
          }
          // 背景メディアがない場合は画面サイズにフォールバック
          return { width: toEven(window.innerWidth), height: toEven(window.innerHeight) };
        }
        case 'custom':
          return {
            width: toEven(settings.customWidth || 1920),
            height: toEven(settings.customHeight || 1080)
          };
        case 'screen':
          return { width: toEven(window.innerWidth), height: toEven(window.innerHeight) };
        default: {
          // "1920x1080" のような固定プリセット
          const [w, h] = settings.resolutionMode.split('x').map(Number);
          if (w && h) return { width: toEven(w), height: toEven(h) };
          return { width: toEven(window.innerWidth), height: toEven(window.innerHeight) };
        }
      }
    }

    // 設定パネルの解像度プレビュー表示を更新
    function updateResolutionPreview() {
      const el = document.getElementById('resolutionPreview');
      if (!el) return;
      const res = getOutputResolution();
      let label;
      switch (settings.resolutionMode) {
        case 'screen': label = '画面サイズに従います'; break;
        case 'bg':
          label = (bgVideo || bgImage)
            ? `背景メディアに合わせます`
            : '背景メディア未設定のため画面サイズになります';
          break;
        default: label = 'プリセット解像度';
      }
      el.textContent = `出力サイズ: ${res.width} × ${res.height}（${label}）`;
    }

    // 録画開始
    function startRecording() {
      recordedChunks = [];

      if (isSafari()) {
        console.warn('Safariが検出されました。MP4変換処理が非常に遅い、または完了しない場合があります。Chrome推奨です。');
      }

      // 出力解像度を決定し、録画用にキャンバスサイズを一時的に固定する
      const targetRes = getOutputResolution();
      isRecordingResizeLocked = true;
      canvas.width = targetRes.width;
      canvas.height = targetRes.height;
      fitCanvasDisplayToScreen();
      showRecordingFrame(); // 録画枠を表示

      // 冒頭から録画する場合、メディアを巻き戻して再生
      if (settings.recordFromStart) {
        if (audioElement) {
          audioElement.currentTime = 0;
          audioElement.play();
          isAudioPlaying = true;
          isRunning = true;
          const playBtn = document.getElementById('playBtn');
          if (playBtn) {
            playBtn.textContent = '⏸️';
            playBtn.classList.add('active');
          }
        }
        if (bgVideo) {
          bgVideo.currentTime = 0;
          bgVideo.play();
        }
      }

      // 品質設定（WebM録画は高ビットレートで行う）
      let videoBitsPerSecond;
      switch (settings.recordQuality) {
        case 'high':   videoBitsPerSecond = 25000000; break;  // 25Mbps
        case 'low':    videoBitsPerSecond =  4000000; break;  //  4Mbps
        default:       videoBitsPerSecond = 12000000;          // 12Mbps
      }

      // キャンバスストリーム
      const canvasStream = canvas.captureStream(60);

      // 音声トラック追加
      if (settings.recordAudio === 'yes' && audioContext && audioContext.state === 'running') {
        try {
          const dest = audioContext.createMediaStreamDestination();
          analyser.connect(dest);
          dest.stream.getAudioTracks().forEach(t => canvasStream.addTrack(t));
        } catch (e) {
          console.log('音声トラック追加失敗:', e);
        }
      }

      // WebM形式で録画（ブラウザが確実にサポートしている形式）
      const webmTypes = [
        'video/webm;codecs=vp9,opus',
        'video/webm;codecs=vp9',
        'video/webm;codecs=vp8,opus',
        'video/webm;codecs=vp8',
        'video/webm',
      ];
      let mimeType = '';
      for (const t of webmTypes) {
        if (MediaRecorder.isTypeSupported(t)) { mimeType = t; break; }
      }
      if (!mimeType) {
        isRecordingResizeLocked = false;
        resizeCanvas();
        hideRecordingFrame();
        showInfo('❌ お使いのブラウザは録画をサポートしていません');
        return;
      }

      try {
        mediaRecorder = new MediaRecorder(canvasStream, { mimeType, videoBitsPerSecond });
      } catch (e) {
        isRecordingResizeLocked = false;
        resizeCanvas();
        hideRecordingFrame();
        showInfo('❌ 録画開始失敗: ' + e.message);
        return;
      }

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };

      mediaRecorder.onstop = async () => {
        const webmBlob = new Blob(recordedChunks, { type: 'video/webm' });
        // 録画用に固定していたキャンバスサイズを画面サイズに戻す
        isRecordingResizeLocked = false;
        resizeCanvas();
        hideRecordingFrame();
        if (settings.outputFormat === 'webm') {
          // WebM直接ダウンロード（変換なし）
          downloadBlob(webmBlob, 'visualizer-' + Date.now() + '.webm');
          showInfo('⬇️ WebMでダウンロードしました');
        } else {
          await convertToMp4(webmBlob);
        }
      };

      mediaRecorder.start(500);
      isRecording = true;

      document.getElementById('recordBtn').textContent = '⏹️ 録画停止';
      document.getElementById('recordBtn').classList.add('recording');
      document.getElementById('recordingIndicator').classList.add('show');
      showInfo('🔴 録画中... 停止ボタンを押すとMP4に変換されます');

      // バックグラウンドでFFmpegをロード開始
      loadFFmpeg();
    }

    // 録画停止
    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      isRecording = false;
      document.getElementById('recordBtn').textContent = '⏺️ 録画開始';
      document.getElementById('recordBtn').classList.remove('recording');
      document.getElementById('recordingIndicator').classList.remove('show');
      showInfo('⏳ 変換中... しばらくお待ちください');
    }

    // WebM → MP4 変換
    async function convertToMp4(webmBlob) {
      const overlay = document.getElementById('convertingOverlay');
      const progressBar = document.getElementById('convertProgressBar');
      const statusEl = document.getElementById('convertStatus');

      overlay.classList.add('show');
      progressBar.classList.remove('indeterminate');
      progressBar.style.width = '0%';
      statusEl.textContent = 'FFmpegを準備中... (初回は数十秒かかります)';

      const safariWarning = document.getElementById('safariWarning');
      if (safariWarning) safariWarning.style.display = isSafari() ? 'block' : 'none';

      // ファイルサイズ警告（200MB超は変換失敗リスクが高い）
      const fileSizeMB = Math.round(webmBlob.size / 1024 / 1024);
      if (fileSizeMB > 200) {
        const proceed = confirm(
          `録画ファイルが ${fileSizeMB}MB と大きいため、ブラウザ内変換が失敗する可能性があります。\n\n` +
          `「OK」: MP4変換を試みる（失敗時はWebMでダウンロード）\n` +
          `「キャンセル」: WebMのまま今すぐダウンロードする`
        );
        if (!proceed) {
          overlay.classList.remove('show');
          downloadBlob(webmBlob, 'visualizer-' + Date.now() + '.webm');
          showInfo('⬇️ WebM形式でダウンロードしました（' + fileSizeMB + 'MB）');
          return;
        }
      }

      try {
        const ffmpeg = await loadFFmpeg();

        if (!ffmpeg) {
          overlay.classList.remove('show');
          downloadBlob(webmBlob, 'visualizer-' + Date.now() + '.webm');
          showInfo('❌ FFmpegのロードに失敗しました。WebM形式でダウンロードしました。コンソール(F12)で詳細を確認してください。');
          return;
        }

        statusEl.textContent = `データを読み込み中... (${fileSizeMB}MB)`;
        progressBar.style.width = '5%';

        // WebMデータをFFmpegの仮想FSに書き込む
        const { fetchFile } = FFmpeg;
        const inputData = await fetchFile(webmBlob);
        ffmpeg.FS('writeFile', 'input.webm', inputData);

        statusEl.textContent = '変換中... (しばらくお待ちください)';
        progressBar.classList.add('indeterminate');

        // CRF値（品質）を設定
        let crf;
        switch (settings.recordQuality) {
          case 'high': crf = '18'; break;
          case 'low':  crf = '28'; break;
          default:     crf = '22';
        }

        // 音声設定
        const audioArgs = settings.recordAudio === 'yes'
          ? ['-c:a', 'aac', '-b:a', '192k']
          : ['-an'];

        // タイムアウト処理（5分で強制終了）
        let isTimedOut = false;
        const timeoutMs = 5 * 60 * 1000;
        const timeoutId = setTimeout(() => {
          isTimedOut = true;
          console.warn('FFmpeg変換タイムアウト');
        }, timeoutMs);

        // タイムアウト監視とffmpeg.runを並走させる
        const runPromise = ffmpeg.run(
          '-i', 'input.webm',
          '-vf', 'scale=trunc(iw/2)*2:trunc(ih/2)*2',
          '-c:v', 'libx264',
          '-preset', 'ultrafast',
          '-crf', crf,
          '-pix_fmt', 'yuv420p',
          ...audioArgs,
          '-movflags', '+faststart',
          'output.mp4'
        );

        const timeoutPromise = new Promise((_, reject) => {
          setTimeout(() => reject(new Error(
            `変換がタイムアウトしました（5分経過）。ファイルが大きすぎる可能性があります（${fileSizeMB}MB）。WebMでダウンロードします。`
          )), timeoutMs);
        });

        await Promise.race([runPromise, timeoutPromise]);
        clearTimeout(timeoutId);

        statusEl.textContent = 'ファイルを生成中...';
        progressBar.classList.remove('indeterminate');
        progressBar.style.width = '95%';

        const data = ffmpeg.FS('readFile', 'output.mp4');

        // 変換失敗時（0バイト）を検知
        if (!data || data.length === 0) {
          throw new Error('変換結果が空でした。動画の解像度や形式に問題がある可能性があります。');
        }

        const mp4Blob = new Blob([data.buffer], { type: 'video/mp4' });

        // クリーンアップ
        try {
          ffmpeg.FS('unlink', 'input.webm');
          ffmpeg.FS('unlink', 'output.mp4');
        } catch (e) {}

        progressBar.style.width = '100%';
        statusEl.textContent = '完了！';

        setTimeout(() => {
          overlay.classList.remove('show');
          downloadBlob(mp4Blob, 'visualizer-' + Date.now() + '.mp4');
          showInfo('✅ MP4のダウンロードが始まりました！');
        }, 500);

      } catch (err) {
        console.error('MP4変換エラー:', err);
        overlay.classList.remove('show');
        // クリーンアップを試みる
        try {
          const ffmpeg = ffmpegInstance;
          if (ffmpeg) {
            try { ffmpeg.FS('unlink', 'input.webm'); } catch(e) {}
            try { ffmpeg.FS('unlink', 'output.mp4'); } catch(e) {}
          }
        } catch(e) {}
        downloadBlob(webmBlob, 'visualizer-' + Date.now() + '.webm');
        showInfo('❌ MP4変換に失敗: ' + err.message + ' → WebMでダウンロードしました。');
      }
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }
